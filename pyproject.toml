[project]
name = "coopie"
version = "0.1.0"
description = "基于 Copier 的通用 Python 项目模板"
readme = "README.md"
requires-python = ">=3.8"
dependencies = []

[project.optional-dependencies]
dev = [
    "httpx>=0.28.0",
    "prek>=0.4.5",
    "pyrefly>=1.1.1",
    "pytest-asyncio>=0.24.0",
    "pytest-cov>=5.0.0",
    "pytest-html>=4.1.1",
    "pytest-mock>=3.14.0",
    "pytest-xdist>=3.6.1",
    "pytest>=8.0.0",
    "ruff>=0.8.0",
]

[build-system]
build-backend = "hatchling.build"
requires = ["hatchling"]

[dependency-groups]
dev = ["coopie[dev]"]

[[tool.uv.index]]
url = "https://mirrors.aliyun.com/pypi/simple/"
default = true

[project.scripts]
coopie = "coopie.cli:main"


[tool.ruff]
extend-exclude = ["template"]

[tool.ruff.lint]
select = ["E", "F", "W", "I", "UP"]

[tool.ruff.format]
quote-style = "double"

[tool.pyrefly]
preset = "strict"
project-includes = ["src/**/*.py*"]
project-excludes = ["template/**", ".venv/**"]
python-version = "3.8"

[tool.pytest.ini_options]
norecursedirs = [".venv", "template"]
