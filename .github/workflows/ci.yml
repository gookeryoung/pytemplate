name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint & Typecheck
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v5

      - name: Install uv
        uses: astral-sh/setup-uv@v8.3.2
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Sync dependencies
        run: uv sync --frozen --extra lint

      - name: Ruff check
        run: uv run ruff check

      - name: Ruff format check
        run: uv run ruff format --check

      - name: Pyrefly check
        run: uv run pyrefly check

  test:
    name: Test
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v5

      - name: Install uv
        uses: astral-sh/setup-uv@v8.3.2
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Sync dependencies
        run: uv sync --frozen --extra test

      - name: Run tests
        run: uv run pytest --cov

  render:
    name: Render Template
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        project-type: [library, cli, gui, web]
    steps:
      - uses: actions/checkout@v5

      - name: Install copier
        run: uvx copier --version

      - name: Render template
        run: |
          mkdir -p .preview
          uvx copier copy --trust --defaults --vcs-ref HEAD . .preview/out --data project_type=${{ matrix.project-type }}

      - name: Verify rendered structure
        run: |
          test -f .preview/out/pyproject.toml
          test -f .preview/out/README.md
          test -d .preview/out/src
          test -d .preview/out/tests
          test -f .preview/out/.copier-answers.yml
          test -f .preview/out/ruff.toml
          test -f .preview/out/pytest.ini
          test -f .preview/out/.coveragerc
          test -f .preview/out/pyrefly.toml
          test -f .preview/out/.bumpversion.toml
          test -f .preview/out/uv.toml

      - name: Verify Python syntax (rendered pyproject.toml)
        run: |
          python -c "import tomllib; tomllib.loads(open('.preview/out/pyproject.toml').read())" || \
          python -c "import tomli; tomli.loads(open('.preview/out/pyproject.toml').read())"

  docs:
    name: Build Docs
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v5

      - name: Install uv
        uses: astral-sh/setup-uv@v8.3.2
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Sync dependencies
        run: uv sync --frozen --extra docs

      - name: Build Sphinx docs
        run: uv run sphinx-build -b html docs docs/_build/html
