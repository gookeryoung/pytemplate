name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: {% raw %}${{ github.workflow }}-${{ github.ref }}{% endraw %}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint & Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Sync dependencies
        run: uv sync --extra dev

      - name: Ruff check
        run: uv run ruff check src tests

      - name: Ruff format check
        run: uv run ruff format --check src tests

      - name: Pyrefly check
        run: uv run pyrefly check .

  test:
    name: Test (Python {{ ci_test_versions[0] }} & {{ ci_test_versions[-1] }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: [{% for v in ci_test_versions %}"{{ v }}"{% if not loop.last %}, {% endif %}{% endfor %}]
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Set up Python {% raw %}${{ matrix.python-version }}{% endraw %}
        run: uv python install {% raw %}${{ matrix.python-version }}{% endraw %}

      - name: Sync dependencies
        run: uv sync --extra dev --python {% raw %}${{ matrix.python-version }}{% endraw %}

      - name: Run tests
        run: uv run pytest -m "not slow" --cov={{ package_name }} --cov-fail-under={{ coverage_fail_under }} --cov-report=term-missing
